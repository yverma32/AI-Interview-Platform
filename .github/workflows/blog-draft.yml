name: Blog Draft (3x weekly)

# Runs Mon / Wed / Fri at 03:30 UTC (= 09:00 IST).
# Set ANTHROPIC_API_KEY in repo Settings → Secrets and variables → Actions.
# Manual runs are allowed via workflow_dispatch (use this to test).
on:
  schedule:
    - cron: '30 3 * * 1,3,5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run the prompt-only dry-run (no Claude call, no PR).'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repo
        uses: actions/checkout@v6
        with:
          # Need full history so we can branch + push cleanly.
          fetch-depth: 0
          # Default token has the contents:write + pull-requests:write perms
          # granted above. No PAT needed.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install agent deps
        working-directory: scripts
        run: npm ci || npm install

      - name: Run dry-run (manual only)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' }}
        working-directory: scripts
        run: node generate-blog-post.mjs --dry-run

      - name: Generate draft
        id: generate
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true') }}
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node generate-blog-post.mjs

      - name: Configure git
        if: ${{ steps.generate.outcome == 'success' }}
        run: |
          git config user.name  "prepfinity-blog-bot"
          git config user.email "blog-bot@users.noreply.github.com"

      - name: Create branch, commit, push
        if: ${{ steps.generate.outcome == 'success' }}
        env:
          SLUG: ${{ steps.generate.outputs.slug }}
        run: |
          BRANCH="blog/auto/${SLUG}"
          git checkout -b "$BRANCH"
          git add content/topics.json client/src/content/blog/auto/
          git commit -m "blog(draft): ${{ steps.generate.outputs.title }}"
          git push --set-upstream origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
        id: push

      - name: Open PR
        if: ${{ steps.generate.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.push.outputs.branch }}" \
            --title "[Blog Draft] ${{ steps.generate.outputs.title }}" \
            --body "$(cat <<'EOF'
          Auto-generated blog draft. **Do not merge without reviewing.** See the
          review checklist below before approving.

          ## Review checklist

          - [ ] Voice matches PrepFinity tone — opinionated, specific, no AI-smell
          - [ ] No fabricated statistics or company-specific facts
          - [ ] Target keyword appears naturally (not stuffed)
          - [ ] Internal links resolve to live prepfinity.co pages
          - [ ] Title ≤ 60 chars and contains the target keyword
          - [ ] Description 145–160 chars
          - [ ] No banned phrases (run a final grep if unsure)
          - [ ] CTA at the end uses the standard format

          ## After review

          Edit in place if needed. The file lives under \`client/src/content/blog/auto/\`. You can move it up to \`client/src/content/blog/\` after editing if you want a visible "human-reviewed" signal in the tree — both directories publish.

          ## Generated by

          \`.github/workflows/blog-draft.yml\` — cron \`30 3 * * 1,3,5\` (Mon/Wed/Fri 09:00 IST).
          EOF
          )"
