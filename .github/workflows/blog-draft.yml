name: Blog Draft (3x weekly)

# Runs Mon / Wed / Fri at 03:30 UTC (= 09:00 IST).
# Set ANTHROPIC_API_KEY in repo Settings → Secrets and variables → Actions.
# Manual runs are allowed via workflow_dispatch (use this to test).
on:
  schedule:
    - cron: '30 3 * * 1,3,5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run the prompt-only dry-run (no Claude call, no PR).'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repo
        uses: actions/checkout@v6
        with:
          # Need full history so we can branch + push cleanly.
          fetch-depth: 0
          # Default token has the contents:write + pull-requests:write perms
          # granted above. No PAT needed.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install agent deps
        working-directory: scripts
        run: npm ci || npm install

      - name: Run dry-run (manual only)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' }}
        working-directory: scripts
        run: node generate-blog-post.mjs --dry-run

      - name: Generate draft
        id: generate
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true') }}
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node generate-blog-post.mjs

      - name: Configure git
        if: ${{ steps.generate.outcome == 'success' }}
        run: |
          git config user.name  "prepfinity-blog-bot"
          git config user.email "blog-bot@users.noreply.github.com"

      # Consume the topic on main IMMEDIATELY, before the draft PR exists.
      # This is the fix for the run-wedging bug: the agent marks the topic
      # `used` in content/topics.json, but previously that flag only reached
      # main when the draft PR merged. If the PR push failed (e.g. a leftover
      # branch caused a non-fast-forward rejection), the flag was never
      # persisted, so every subsequent run re-picked the same topic and
      # collided on the same branch name forever. Committing topics.json
      # straight to main here guarantees the topic is consumed exactly once,
      # independent of whether/when the draft PR merges.
      - name: Persist used-topic flag to main
        if: ${{ steps.generate.outcome == 'success' }}
        run: |
          git add content/topics.json
          git commit -m "blog(topics): mark '${{ steps.generate.outputs.title }}' as drafted"
          # Rebase onto the latest main in case something else pushed meanwhile,
          # then push. With a single-file commit this should always fast-forward.
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Create branch, commit, push
        if: ${{ steps.generate.outcome == 'success' }}
        env:
          SLUG: ${{ steps.generate.outputs.slug }}
        run: |
          # Run-unique branch name so a leftover branch from a prior run can
          # never reject this push as non-fast-forward.
          BRANCH="blog/auto/${SLUG}-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          # Only the new draft file goes on the PR branch — topics.json was
          # already committed to main above, so adding it here would create a
          # needless merge conflict.
          git add client/src/content/blog/auto/
          git commit -m "blog(draft): ${{ steps.generate.outputs.title }}"
          git push --set-upstream origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
        id: push

      - name: Open PR and enable auto-merge
        if: ${{ steps.generate.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --base main \
            --head "${{ steps.push.outputs.branch }}" \
            --title "[Blog Draft] ${{ steps.generate.outputs.title }}" \
            --body "$(cat <<'EOF'
          Auto-generated blog draft. **Auto-merge is enabled** — this PR merges
          itself once any required checks pass. Review after the fact and edit
          in place on main if needed; the validator the agent runs already
          enforces the hard constraints below.

          ## Quality bar the agent enforces

          - Voice matches PrepFinity tone — opinionated, specific, no AI-smell
          - No banned phrases (the generator hard-fails on them)
          - Target keyword appears naturally (not stuffed)
          - Title and description within length limits
          - At least 2 internal prepfinity.co links

          ## Where it lives

          The file is under \`client/src/content/blog/auto/\`. To give a post a
          visible "human-reviewed" signal in the tree, move it up to
          \`client/src/content/blog/\` — both directories publish.

          ## Generated by

          \`.github/workflows/blog-draft.yml\` — cron \`30 3 * * 1,3,5\` (Mon/Wed/Fri 09:00 IST).
          EOF
          )")
          echo "Opened $PR_URL"
          # Enable auto-merge (squash). Merges as soon as required checks pass;
          # if there are no required checks, it merges immediately.
          gh pr merge "$PR_URL" --auto --squash
