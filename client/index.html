<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0B0F24" />

    <!-- Primary meta -->
    <title>PrepFinity — AI Mock Interview Practice</title>
    <meta name="description" content="Practice real technical interviews with an AI interviewer. Voice or text, real-time scoring, weak-topic analytics. Free to start — no credit card needed." />
    <meta name="keywords" content="AI mock interview, technical interview practice, coding interview prep, system design interview, DSA interview, AI interviewer, interview simulator, voice interview practice" />
    <link rel="canonical" href="https://prepfinity.co/" />

    <!-- Open Graph (fallback — react-helmet-async overrides per-route once JS runs) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PrepFinity" />
    <meta property="og:title" content="PrepFinity — AI Mock Interview Practice" />
    <meta property="og:description" content="Practice real technical interviews with an AI interviewer. Voice or text, real-time scoring, weak-topic analytics. Free to start." />
    <meta property="og:image" content="https://prepfinity.co/og-image.png" />
    <meta property="og:url" content="https://prepfinity.co/" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PrepFinity — AI Mock Interview Practice" />
    <meta name="twitter:description" content="Practice real technical interviews with an AI interviewer. Voice or text, real-time scoring, weak-topic analytics. Free to start." />
    <meta name="twitter:image" content="https://prepfinity.co/og-image.png" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/brand-icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <link rel="shortcut icon" type="image/svg+xml" href="/brand-icon.svg" />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "PrepFinity",
      "alternateName": "PrepFinity AI Interview Platform",
      "applicationCategory": "EducationApplication",
      "operatingSystem": "Web",
      "description": "AI-powered mock interview platform with voice and text interviews, real-time scoring, and weak-topic analytics for technical interview prep.",
      "url": "https://prepfinity.co",
      "image": "https://prepfinity.co/og-image.png",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR",
        "description": "Free to start — 2 Basic + 1 Premium credit on signup"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "reviewCount": "27"
      },
      "featureList": [
        "Voice and text AI interviews",
        "Real-time scoring and feedback",
        "Weak-topic analytics",
        "5 interviewer personas",
        "Resume-aware interviews",
        "Question bank generator",
        "Company-specific tracks (TCS, Infosys, Wipro, Razorpay, Google, Microsoft, Amazon)"
      ]
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "PrepFinity",
      "url": "https://prepfinity.co",
      "logo": "https://prepfinity.co/og-image.png",
      "sameAs": []
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
