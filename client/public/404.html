<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0B0F24" />

    <!-- Auto-redirect to home after 2s. meta refresh works without JS so it's
         the most defensive option for clients that don't run scripts. -->
    <meta http-equiv="refresh" content="2; url=/" />

    <!-- Tell crawlers not to index this; it's a transient state, not real content. -->
    <meta name="robots" content="noindex, nofollow" />

    <title>Page Not Found — PrepFinity</title>
    <link rel="icon" type="image/svg+xml" href="/brand-icon.svg" />

    <style>
      :root {
        color-scheme: dark;
        --bg: #050510;
        --bg-card: #0b1030;
        --text: #f5f7ff;
        --text-muted: #cdd5e6;
        --neon-cyan: #00f0ff;
        --neon-magenta: #ff2bd6;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        min-height: 100dvh;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        min-height: 100dvh;
        padding: 24px;
        text-align: center;
      }
      .code {
        font-size: 96px;
        font-weight: 800;
        line-height: 1;
        margin: 0 0 8px;
        background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        letter-spacing: -2px;
      }
      h1 {
        font-size: 28px;
        font-weight: 700;
        margin: 0 0 16px;
      }
      p {
        font-size: 16px;
        color: var(--text-muted);
        line-height: 1.6;
        margin: 0 0 24px;
        max-width: 480px;
      }
      .btn {
        display: inline-block;
        padding: 12px 28px;
        background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
        color: #050510;
        text-decoration: none;
        font-weight: 700;
        border-radius: 999px;
        letter-spacing: 0.02em;
      }
      .btn:hover { opacity: 0.92; }
      .small {
        margin-top: 20px;
        font-size: 13px;
        color: #5a647a;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="code">404</div>
      <h1>Page Not Found</h1>
      <p>
        That URL doesn't exist on PrepFinity. We're taking you back to the homepage in a moment.
      </p>
      <a class="btn" href="/">Go to Home</a>
      <p class="small">Redirecting automatically…</p>
    </div>
  </body>
</html>
