<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="PrepFinity — AI Mock Interview Practice">
  <defs>
    <!-- Deep background gradient: near-black with a hint of blue -->
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#0B0F24"/>
      <stop offset="60%" stop-color="#070818"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>

    <!-- Cyan-to-magenta brand gradient for accents -->
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#ff2bd6"/>
    </linearGradient>

    <!-- Subtle glow for the wordmark -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Cyan glow for the orb -->
    <radialGradient id="orbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#00f0ff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Magenta glow accent -->
    <radialGradient id="magentaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2bd6" stop-opacity="0.45"/>
      <stop offset="70%" stop-color="#ff2bd6" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ff2bd6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient color glows (top-right cyan, bottom-left magenta) -->
  <circle cx="1050" cy="120" r="280" fill="url(#orbGlow)"/>
  <circle cx="120" cy="540" r="260" fill="url(#magentaGlow)"/>

  <!-- Subtle grid lines for a "tech" feel -->
  <g stroke="#00f0ff" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="80"  x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
  </g>

  <!-- Brand chip (top-left) -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" rx="22" ry="22" width="240" height="44"
          fill="#0F1430" stroke="#00f0ff" stroke-opacity="0.35" stroke-width="1.5"/>
    <circle cx="22" cy="22" r="5" fill="#00f0ff"/>
    <text x="42" y="29" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="16" font-weight="600" fill="#00f0ff" letter-spacing="1.5">
      AI INTERVIEW PRACTICE
    </text>
  </g>

  <!-- Wordmark "PrepFinity" -->
  <g filter="url(#glow)">
    <text x="80" y="290"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="120" font-weight="800" fill="url(#brand)" letter-spacing="-3">
      PrepFinity
    </text>
  </g>

  <!-- Tagline (two lines) -->
  <text x="80" y="380"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="52" font-weight="700" fill="#f5f7ff" letter-spacing="-1">
    Practice real interviews.
  </text>
  <text x="80" y="445"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="52" font-weight="700" fill="#f5f7ff" letter-spacing="-1">
    Get scored in <tspan fill="url(#brand)">real time</tspan>.
  </text>

  <!-- Feature pills row -->
  <g transform="translate(80, 495)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
     font-size="20" font-weight="600" fill="#cdd5e6">
    <!-- Pill 1 -->
    <g>
      <rect x="0" y="0" rx="22" ry="22" width="190" height="44"
            fill="#0F1430" stroke="#ffffff" stroke-opacity="0.10"/>
      <circle cx="22" cy="22" r="5" fill="#00f0ff"/>
      <text x="42" y="29">Voice &amp; Text</text>
    </g>
    <!-- Pill 2 -->
    <g transform="translate(210, 0)">
      <rect x="0" y="0" rx="22" ry="22" width="240" height="44"
            fill="#0F1430" stroke="#ffffff" stroke-opacity="0.10"/>
      <circle cx="22" cy="22" r="5" fill="#ff2bd6"/>
      <text x="42" y="29">Real-Time Scoring</text>
    </g>
    <!-- Pill 3 -->
    <g transform="translate(470, 0)">
      <rect x="0" y="0" rx="22" ry="22" width="220" height="44"
            fill="#0F1430" stroke="#ffffff" stroke-opacity="0.10"/>
      <circle cx="22" cy="22" r="5" fill="#00f0ff"/>
      <text x="42" y="29">5 AI Personas</text>
    </g>
  </g>

  <!-- Right-side decorative "interview UI" mock -->
  <g transform="translate(770, 130)" opacity="0.92">
    <!-- Outer glass card -->
    <rect x="0" y="0" rx="20" ry="20" width="360" height="290"
          fill="#0B1030" stroke="#00f0ff" stroke-opacity="0.25" stroke-width="1.5"/>
    <!-- Header bar with persona avatar -->
    <circle cx="40" cy="42" r="20" fill="url(#brand)"/>
    <text x="72" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="18" font-weight="700" fill="#f5f7ff">Alex · DSA</text>
    <text x="72" y="58" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="13" font-weight="500" fill="#00f0ff">Speaking…</text>

    <!-- Waveform bars -->
    <g transform="translate(30, 110)" fill="url(#brand)">
      <rect x="0"   y="20" width="6" height="20" rx="3"/>
      <rect x="14"  y="10" width="6" height="40" rx="3"/>
      <rect x="28"  y="0"  width="6" height="60" rx="3"/>
      <rect x="42"  y="12" width="6" height="36" rx="3"/>
      <rect x="56"  y="22" width="6" height="16" rx="3"/>
      <rect x="70"  y="8"  width="6" height="44" rx="3"/>
      <rect x="84"  y="0"  width="6" height="60" rx="3"/>
      <rect x="98"  y="14" width="6" height="32" rx="3"/>
      <rect x="112" y="22" width="6" height="16" rx="3"/>
      <rect x="126" y="6"  width="6" height="48" rx="3"/>
      <rect x="140" y="0"  width="6" height="60" rx="3"/>
      <rect x="154" y="14" width="6" height="32" rx="3"/>
      <rect x="168" y="22" width="6" height="16" rx="3"/>
      <rect x="182" y="10" width="6" height="40" rx="3"/>
      <rect x="196" y="0"  width="6" height="60" rx="3"/>
      <rect x="210" y="16" width="6" height="28" rx="3"/>
      <rect x="224" y="22" width="6" height="16" rx="3"/>
      <rect x="238" y="8"  width="6" height="44" rx="3"/>
      <rect x="252" y="0"  width="6" height="60" rx="3"/>
      <rect x="266" y="14" width="6" height="32" rx="3"/>
      <rect x="280" y="22" width="6" height="16" rx="3"/>
      <rect x="294" y="10" width="6" height="40" rx="3"/>
    </g>

    <!-- Score row -->
    <g transform="translate(30, 210)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
      <text x="0" y="0" font-size="13" font-weight="600" fill="#7a8298" letter-spacing="1.5">CURRENT SCORE</text>
      <text x="0" y="40" font-size="44" font-weight="800" fill="url(#brand)">8.6<tspan font-size="22" fill="#7a8298"> / 10</tspan></text>
      <!-- Progress bar -->
      <rect x="160" y="20" width="170" height="10" rx="5" fill="#1a2244"/>
      <rect x="160" y="20" width="146" height="10" rx="5" fill="url(#brand)"/>
    </g>
  </g>

  <!-- Footer URL -->
  <text x="1120" y="595" text-anchor="end"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="22" font-weight="700" fill="#00f0ff" letter-spacing="0.5">
    prepfinity.co
  </text>

  <!-- Bottom-left subtle credit -->
  <text x="80" y="595"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="14" font-weight="500" fill="#5a647a" letter-spacing="2">
    AI · VOICE · TEXT · INSTANT FEEDBACK
  </text>
</svg>
